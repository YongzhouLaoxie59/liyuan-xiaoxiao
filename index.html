<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>梨园消消 - 京剧三消手游</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #1a0a0a;
  display:flex; justify-content:center; align-items:center;
  min-height:100vh; font-family:'STSong','SimSun','KaiTi',serif;
  overflow:hidden;
}
#container {
  width:420px; height:820px; position:relative;
  background: linear-gradient(180deg, #2d1a0a 0%, #4a2010 30%, #3a1808 100%);
  border:4px solid #8B6914; border-radius:16px;
  box-shadow: 0 0 60px rgba(255,180,0,0.3), inset 0 0 100px rgba(0,0,0,0.5);
  overflow:hidden;
}
.curtain-top {
  position:absolute; top:0; left:0; right:0; height:10px;
  background: linear-gradient(180deg, #8B0000, #a01010, #8B0000);
  z-index:10; border-radius:16px 16px 0 0;
}
.curtain-left, .curtain-right {
  position:absolute; top:10px; width:12px; bottom:0;
  background: linear-gradient(90deg, #6B0000, #8B0000, #6B0000);
  z-index:9;
}
.curtain-left { left:0; border-radius:0 0 0 12px; }
.curtain-right { right:0; border-radius:0 0 12px 0; }
#header {
  position:absolute; top:14px; left:16px; right:16px; height:60px;
  display:flex; align-items:center; justify-content:space-between;
  z-index:5;
}
#title-area { text-align:center; flex:1; }
#title-area h1 { font-size:26px; color:#FFD700; text-shadow: 2px 2px 4px #000; letter-spacing:4px; }
#title-area .subtitle { font-size:10px; color:#c8a860; letter-spacing:2px; }
#score-box {
  background: linear-gradient(180deg, #5a2010, #3a1008);
  border:2px solid #8B6914; border-radius:10px; padding:5px 12px; text-align:center;
  min-width:68px;
}
#score-box .label { font-size:10px; color:#c8a860; }
#score-box .value { font-size:20px; color:#FFD700; font-weight:bold; }
#level-bar {
  position:absolute; top:92px; left:20px; right:20px;
  display:flex; align-items:center; justify-content:space-between;
  z-index:5;
}
#level-info { font-size:12px; color:#FFD700; letter-spacing:1px; }
#mask-info { font-size:12px; color:#c8a860; letter-spacing:1px; }
#board-area {
  position:absolute; top:110px; left:50%; transform:translateX(-50%);
  width:384px; height:384px;
  background: linear-gradient(135deg, #2a1508, #1a0a04);
  border:3px solid #8B6914; border-radius:8px;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
}
#gameCanvas { display:block; width:384px; height:384px; cursor:pointer; border-radius:6px; }
#message {
  position:absolute; top:514px; left:50%; transform:translateX(-50%);
  font-size:15px; color:#FFD700; font-weight:bold;
  text-shadow: 0 0 10px rgba(255,180,0,0.8);
  z-index:20; pointer-events:none; opacity:0;
  transition: opacity 0.3s; text-align:center; width:340px;
}
#message.show { opacity:1; }
#energy-area { position:absolute; top:550px; left:28px; right:28px; z-index:5; }
#energy-label { font-size:11px; color:#c8a860; margin-bottom:4px; display:flex; justify-content:space-between; }
#energy-bar-bg { height:16px; background:#1a0a04; border:2px solid #8B6914; border-radius:8px; overflow:hidden; }
#energy-bar-fill {
  height:100%; width:0%;
  background: linear-gradient(90deg, #FFD700, #FFA500);
  border-radius:6px; transition: width 0.3s;
  box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);
}
#skills-area {
  position:absolute; top:580px; left:14px; right:14px;
  display:flex; justify-content:space-between; gap:5px; z-index:5;
}
.skill-btn {
  flex:1; height:72px;
  background: linear-gradient(180deg, #5a2010, #3a1008);
  border:2px solid #5a4020; border-radius:10px;
  cursor:pointer; color:#FFD700; font-size:10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative; transition: all 0.2s;
  user-select:none; -webkit-tap-highlight-color:transparent; gap:2px;
}
.skill-btn canvas { width:38px; height:38px; }
.skill-btn:hover { border-color:#FFD700; background: linear-gradient(180deg, #6a2810, #4a1808); }
.skill-btn.skill-selected { border-color:#FF4444; box-shadow:0 0 20px rgba(255,0,0,0.6); transform:scale(1.06); }
.skill-btn.disabled { opacity:0.4; pointer-events:none; }
.skill-btn .skill-name { font-size:10px; color:#c8a860; }
.skill-btn .skill-cost { font-size:9px; color:#888; }
#bottom-area {
  position:absolute; bottom:14px; left:10px; right:10px;
  display:flex; justify-content:center; gap:10px; z-index:5;
}
.ctrl-btn {
  padding:9px 18px; font-size:13px; font-family:inherit;
  background: linear-gradient(180deg, #8B6914, #6B4904);
  border:2px solid #FFD700; border-radius:20px;
  color:#1a0a0a; font-weight:bold; cursor:pointer;
  letter-spacing:2px; transition:all 0.2s;
}
.ctrl-btn:hover { background: linear-gradient(180deg, #FFD700, #c8a860); }
.ctrl-btn:active { transform:scale(0.95); }
.ctrl-btn.reshuffle-btn {
  background: linear-gradient(180deg, #4a2090, #3a1070);
  border-color:#a060ff;
}
.ctrl-btn.reshuffle-btn.ad-needed {
  background: linear-gradient(180deg, #cc4400, #993300);
  border-color:#ff8800;
}
.ctrl-btn:disabled { opacity:0.45; pointer-events:none; cursor:default; }
.combo-popup {
  position:absolute; pointer-events:none; z-index:30;
  font-size:18px; font-weight:bold; animation: floatUp 1s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-70px) scale(1.4); }
}
@media (max-width:440px) {
  #container { width:100vw; height:100vh; border-radius:0; border:none; }
  #level-bar { top:88px; }
  #board-area { width:92vw; height:92vw; top:120px; }
  #gameCanvas { width:92vw; height:92vw; }
  #message { top:calc(120px + 92vw + 12px); }
  #energy-area { top:calc(120px + 92vw + 44px); }
  #skills-area { top:calc(120px + 92vw + 76px); }
}
#toast {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:50; pointer-events:none; opacity:0;
  font-size:32px; font-weight:bold; letter-spacing:4px;
  text-shadow: 0 0 30px rgba(255,215,0,0.8); transition:all 0.5s;
  text-align:center; line-height:1.4;
}
#toast.show { opacity:1; }
#toast.win { color:#FFD700; }
#toast.lose { color:#FF4444; }
/* ===== 过关遮罩 ===== */
#overlay {
  display:none; position:absolute; top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7); z-index:60;
  flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#overlay.show { display:flex; }
#overlay h2 { font-size:28px; color:#FFD700; letter-spacing:4px; text-shadow:0 0 20px gold; }
#overlay p { font-size:16px; color:#c8a860; }
#overlay .big-score { font-size:36px; color:#FFD700; font-weight:bold; }
.overlay-btn {
  padding:12px 36px; font-size:16px; font-family:inherit;
  background: linear-gradient(180deg, #FFD700, #c8a860);
  border:none; border-radius:24px; color:#1a0a0a; font-weight:bold;
  cursor:pointer; letter-spacing:2px;
}
.overlay-btn-secondary {
  padding:8px 24px; font-size:13px; font-family:inherit;
  background:transparent; border:2px solid #c8a860; border-radius:20px;
  color:#c8a860; cursor:pointer; letter-spacing:1px;
}
/* ===== 重排弹窗 ===== */
#reshuffle-modal {
  display:none; position:absolute; top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.8); z-index:65;
  flex-direction:column; align-items:center; justify-content:center; gap:12px;
}
#reshuffle-modal.show { display:flex; }
#reshuffle-modal h3 { font-size:20px; color:#FFD700; text-align:center; letter-spacing:2px; }
#reshuffle-modal p { font-size:14px; color:#c8a860; text-align:center; max-width:280px; }
#reshuffle-modal .ad-btn {
  padding:10px 28px; font-size:14px; font-family:inherit;
  background: linear-gradient(180deg, #ff6600, #cc4400);
  border:2px solid #ffaa00; border-radius:22px;
  color:#fff; font-weight:bold; cursor:pointer; letter-spacing:1px;
}
#reshuffle-modal .free-btn {
  padding:10px 28px; font-size:14px; font-family:inherit;
  background: linear-gradient(180deg, #4a2090, #3a1070);
  border:2px solid #a060ff; border-radius:22px;
  color:#fff; font-weight:bold; cursor:pointer; letter-spacing:1px;
}
#reshuffle-modal .skip-btn {
  padding:8px 20px; font-size:12px; font-family:inherit;
  background:transparent; border:1px solid #666; border-radius:16px;
  color:#888; cursor:pointer;
}
/* ===== 开场大幕动画 ===== */
#stage-curtain {
  display:none; position:absolute; top:0;left:0;right:0;bottom:0;
  z-index:80; pointer-events:none; overflow:hidden;
}
#stage-curtain.active { display:block; pointer-events:all; }
.curtain-panel {
  position:absolute; top:0; bottom:0; width:50%;
  background: linear-gradient(180deg, #6B0000 0%, #8B1010 20%, #9B1515 50%, #7B0808 80%, #5B0000 100%);
  transition: transform 0.0s;
}
.curtain-panel::before {
  content:''; position:absolute; top:0; bottom:0; width:8px;
  background: linear-gradient(180deg, #FFD700, #c8a860, #FFD700, #c8a860);
  background-size:100% 40px;
}
#curtain-left  { left:0;  }
#curtain-right { right:0; }
#curtain-left::before  { right:0; }
#curtain-right::before { left:0; }
#curtain-title {
  position:absolute; top:50%; left:0; right:0;
  transform:translateY(-50%);
  text-align:center; pointer-events:none; opacity:0;
  transition:opacity 0.5s;
}
#curtain-title .ct-level { font-size:14px; color:#c8a860; letter-spacing:3px; margin-bottom:8px; }
#curtain-title .ct-main  { font-size:32px; color:#FFD700; letter-spacing:6px; text-shadow:0 0 30px gold, 2px 2px 4px #000; }
#curtain-title .ct-sub   { font-size:14px; color:#FFD700; letter-spacing:2px; margin-top:6px; opacity:0.8; }
/* ===== 京剧知识卡弹窗 ===== */
#knowledge-card {
  display:none; position:absolute; top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.85); z-index:70;
  flex-direction:column; align-items:center; justify-content:center;
}
#knowledge-card.show { display:flex; }
.kc-box {
  width:370px; max-height:740px;
  background: linear-gradient(180deg, #2d1a0a, #4a2010);
  border:3px solid #8B6914; border-radius:16px; overflow:hidden;
  display:flex; flex-direction:column;
}
.kc-header {
  background: linear-gradient(90deg, #6B0000, #8B1010);
  padding:10px 16px; display:flex; align-items:center; gap:10px;
}
.kc-avatar { width:52px; height:52px; border-radius:50%; border:2px solid #c8a860; object-fit:cover; background:#1a0a00; }
.kc-header-text .kc-role { font-size:11px; color:#c8a860; }
.kc-header-text .kc-name { font-size:18px; color:#FFD700; font-weight:bold; letter-spacing:2px; }
.kc-body { padding:14px 16px 6px; flex:1; overflow-y:auto; }
.kc-intro { font-size:13px; color:#e8d0a0; line-height:1.8; margin-bottom:12px; }
.kc-fact { display:flex; gap:6px; margin-bottom:6px; }
.kc-fact-label { font-size:11px; color:#FFD700; white-space:nowrap; padding-top:1px; }
.kc-fact-value { font-size:12px; color:#c8a860; line-height:1.6; }
/* 视频区 */
.kc-video-area {
  margin-top:10px; padding:10px 14px;
  background:rgba(0,0,0,0.3); border-radius:8px; border:1px solid #5a4020;
}
.kc-video-title { font-size:11px; color:#FFD700; margin-bottom:6px; }
.kc-video-desc  { font-size:11px; color:#c8a860; margin-bottom:8px; line-height:1.5; }
.kc-video-url {
  font-size:11px; color:#a0a0a0; font-family:monospace;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:240px; display:inline-block;
  vertical-align:middle; user-select:all;
}
.kc-copy-btn {
  font-size:11px; color:#FFD700; background:none; border:1px solid #FFD700;
  border-radius:10px; padding:2px 10px; cursor:pointer; font-family:inherit;
  line-height:1.4;
}
.kc-copy-btn:hover { background:#FFD700; color:#1a0a00; }
.kc-copy-btn.copied { color:#0f0; border-color:#0f0; }
/* 语言选择器 */
.kc-lang-bar {
  padding:8px 16px 10px; display:flex; gap:6px; justify-content:center;
  border-top:1px solid #5a4020;
}
.kc-lang-btn {
  padding:4px 12px; font-size:11px; font-family:inherit;
  background:transparent; border:1px solid #666; border-radius:14px;
  color:#999; cursor:pointer; transition:all 0.2s;
}
.kc-lang-btn.active {
  background:#8B6914; border-color:#FFD700; color:#FFD700; font-weight:bold;
}
.kc-lang-btn:hover { border-color:#c8a860; color:#c8a860; }
/* 考核评级区 */
.kc-rating {
  margin:0 16px; padding:10px 14px; border-top:1px solid rgba(255,215,0,0.15);
  border-bottom:1px solid rgba(255,215,0,0.15);
  text-align:center;
}
.kc-rating-stars { font-size:22px; letter-spacing:4px; margin-bottom:4px; }
.kc-rating-grade { font-size:14px; font-weight:bold; margin-bottom:6px; }
.kc-rating-grade.gold { color:#FFD700; }
.kc-rating-grade.silver { color:#C0C0C0; }
.kc-rating-grade.bronze { color:#CD7F32; }
.kc-rating-compare { display:flex; justify-content:center; gap:24px; font-size:11px; color:#a0a0a0; }
.kc-rating-compare .rc-item { text-align:center; }
.kc-rating-compare .rc-label { font-size:10px; color:#888; }
.kc-rating-compare .rc-val { font-size:13px; color:#FFD700; }
.kc-rating-compare .rc-best { font-size:11px; color:#888; }
.kc-rating-compare .rc-beat { color:#0f0; font-size:16px; }
.kc-rating-compare .rc-lose { color:#f60; font-size:16px; }
.kc-footer { padding:10px 14px 14px; display:flex; gap:8px; justify-content:center; align-items:center; flex-wrap:wrap; }
.kc-footer .overlay-btn { font-size:14px; padding:10px 22px; }
.kc-footer .overlay-btn-secondary { font-size:13px; padding:8px 14px; white-space:nowrap; }
/* 主界面语言栏 */
#ui-lang-bar {
  position:absolute; top:652px; left:20px; right:20px;
  display:flex; gap:6px; justify-content:center; z-index:5;
}
.ui-lang-btn {
  padding:3px 10px; font-size:10px; font-family:inherit;
  background:transparent; border:1px solid #555; border-radius:12px;
  color:#999; cursor:pointer; transition:all 0.2s;
}
.ui-lang-btn.active {
  background:#8B6914; border-color:#FFD700; color:#FFD700; font-weight:bold;
}
.ui-lang-btn:hover { border-color:#c8a860; color:#c8a860; }

</style>
</head>
<body>
<div id="container">
  <div class="curtain-top"></div>
  <div class="curtain-left"></div>
  <div class="curtain-right"></div>

  <div id="header">
    <div id="score-box">
      <div class="label">分 数</div>
      <div class="value" id="score">0</div>
    </div>
    <div id="title-area">
      <h1>梨园消消</h1>
      <div class="subtitle">京剧三消 · v60606</div>
    </div>
    <div id="score-box">
      <div class="label">步 数</div>
      <div class="value" id="step-count" style="color:#FFD700;font-size:16px;">0</div>
    </div>
  </div>

  <div id="level-bar">
    <div id="level-info">第 1 关　初入梨园</div>
    <div id="mask-info">还需消除：0/64</div>
  </div>

  <div id="board-area">
    <canvas id="gameCanvas" width="768" height="768"></canvas>
  </div>

  <div id="message"></div>

  <div id="energy-area">
    <div id="energy-label"><span>锣鼓能量</span><span id="energy-text">0/100</span></div>
    <div id="energy-bar-bg"><div id="energy-bar-fill"></div></div>
  </div>

  <div id="skills-area">
    <button class="skill-btn" data-skill="sheng" onclick="selectSkill('sheng')">
      <canvas id="icon-sheng" width="76" height="76"></canvas>
      <span class="skill-name">生·横扫</span><span class="skill-cost">30能量</span>
    </button>
    <button class="skill-btn" data-skill="dan" onclick="selectSkill('dan')">
      <canvas id="icon-dan" width="76" height="76"></canvas>
      <span class="skill-name">旦·轻拂</span><span class="skill-cost">30能量</span>
    </button>
    <button class="skill-btn" data-skill="jing" onclick="selectSkill('jing')">
      <canvas id="icon-jing" width="76" height="76"></canvas>
      <span class="skill-name">净·震天</span><span class="skill-cost">30能量</span>
    </button>
    <button class="skill-btn" data-skill="mo" onclick="selectSkill('mo')">
      <canvas id="icon-mo" width="76" height="76"></canvas>
      <span class="skill-name">末·点兵</span><span class="skill-cost">30能量</span>
    </button>
    <button class="skill-btn" data-skill="chou" onclick="selectSkill('chou')">
      <canvas id="icon-chou" width="76" height="76"></canvas>
      <span class="skill-name">丑·逗趣</span><span class="skill-cost">30能量</span>
    </button>
  </div>

  <div id="bottom-area">
    <button class="ctrl-btn" onclick="resetLevel()">重新开局</button>
    <button class="ctrl-btn" onclick="cancelSkill()">取消技能</button>
    <button class="ctrl-btn" onclick="showLevelSelect()">选 关</button>
  </div>

  <!-- 主界面语言选择 -->
  <div id="ui-lang-bar">
    <button class="ui-lang-btn active" data-lang="zh" onclick="switchUiLang('zh')">中 文</button>
    <button class="ui-lang-btn" data-lang="en" onclick="switchUiLang('en')">English</button>
    <button class="ui-lang-btn" data-lang="ja" onclick="switchUiLang('ja')">日本語</button>
    <button class="ui-lang-btn" data-lang="ko" onclick="switchUiLang('ko')">한국어</button>
  </div>

  <div id="toast"></div>

  <!-- 过关/失败遮罩 -->
  <div id="overlay">
    <h2 id="overlay-title">满堂彩！</h2>
    <p id="overlay-desc">第1关通过</p>
    <div class="big-score" id="overlay-score">得分：0</div>
    <button class="overlay-btn" id="overlay-btn" onclick="nextAction()">下一关</button>
    <button class="overlay-btn-secondary" id="overlay-kc-btn" onclick="showKnowledgeCard()" style="display:none">🎭 查看京剧知识卡</button>
  </div>

  <!-- 重排弹窗 -->
  <div id="reshuffle-modal">
    <h3 id="reshuffle-title">棋盘无路可走！</h3>
    <p id="reshuffle-desc">剩余脸谱：0 个</p>
    <button class="ad-btn" id="reshuffle-ad-btn" onclick="doReshuffle(true)">📺 看广告重排</button>
    <p style="font-size:11px;color:#888;margin-top:-4px;">【内测版】广告将模拟播放3秒</p>
    <button class="skip-btn" onclick="closeReshuffleModal()">不重排，结束此关</button>
  </div>

  <!-- 选关弹窗 -->
  <div id="level-select-modal" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:66;flex-direction:column;align-items:center;justify-content:center;gap:10px;">
    <h3 style="font-size:18px;color:#FFD700;letter-spacing:2px;margin-bottom:4px;">🎭 选择关卡</h3>
    <p style="font-size:12px;color:#c8a860;margin-bottom:8px;">可回到任意已解锁关卡</p>
    <div id="level-select-grid" style="display:grid;grid-template-columns:repeat(5,52px);gap:8px;"></div>
    <button onclick="closeLevelSelect()" style="margin-top:14px;padding:8px 28px;font-size:13px;font-family:inherit;background:transparent;border:1px solid #666;border-radius:16px;color:#888;cursor:pointer;">取 消</button>
  </div>

  <!-- 开场大幕 -->
  <div id="stage-curtain">
    <div id="curtain-left"  class="curtain-panel"></div>
    <div id="curtain-right" class="curtain-panel"></div>
    <div id="curtain-title">
      <div class="ct-level" id="ct-level-text">第 1 关</div>
      <div class="ct-main"  id="ct-main-text">初入梨园</div>
      <div class="ct-sub" id="ct-sub-text">需消除：64 个脸谱</div>
    </div>
  </div>

  <!-- 京剧知识卡 -->
  <div id="knowledge-card">
    <div class="kc-box">
      <div class="kc-header">
        <img class="kc-avatar" id="kc-avatar" src="" alt="行当头像">
        <div class="kc-header-text">
          <div class="kc-role" id="kc-role">生行</div>
          <div class="kc-name" id="kc-name">小生与老生</div>
        </div>
      </div>
      <div class="kc-body">
        <div class="kc-intro" id="kc-intro">加载中…</div>

// ======================== 棋子绘制 ========================
function drawFaceMask(ctx2d, cx, cy, r, role, selected, typeId) {
  ctx2d.save();
  const rr = r * 0.78;
  const img = (typeId !== undefined) ? roleImages[typeId] : null;
  if (img && imagesReady) {
    ctx2d.drawImage(img, cx - rr, cy - rr, rr * 2, rr * 2);
    if (selected) {
      ctx2d.strokeStyle = '#FFD700'; ctx2d.lineWidth = 3;
      ctx2d.shadowColor = '#FFD700'; ctx2d.shadowBlur = 16;
      ctx2d.beginPath(); ctx2d.arc(cx, cy, rr + 2, 0, Math.PI*2); ctx2d.stroke();
      ctx2d.shadowBlur = 0;
    }
  } else {
    const g = ctx2d.createRadialGradient(cx - rr*0.15, cy - rr*0.2, rr*0.05, cx, cy, rr*1.05);
    g.addColorStop(0, lightenHex(role.baseColor, 0.30));
    g.addColorStop(0.5, role.baseColor);
    g.addColorStop(1, darkenHex(role.baseColor, 0.20));
    ctx2d.fillStyle = g; ctx2d.beginPath(); ctx2d.arc(cx, cy, rr, 0, Math.PI*2); ctx2d.fill();
    ctx2d.strokeStyle = selected ? '#FFD700' : darkenHex(role.baseColor, 0.35);
    ctx2d.lineWidth = selected ? 3 : 2;
    ctx2d.beginPath(); ctx2d.arc(cx, cy, rr, 0, Math.PI*2); ctx2d.stroke();
    const fontSize = r * 1.1;
    ctx2d.fillStyle = role.accentColor;
    ctx2d.font = 'bold ' + fontSize + 'px "KaiTi","SimSun","STSong",serif';
    ctx2d.textAlign = 'center'; ctx2d.textBaseline = 'middle';
    ctx2d.shadowColor = 'rgba(0,0,0,0.6)'; ctx2d.shadowBlur = 3;
    ctx2d.fillText(role.name, cx, cy); ctx2d.shadowBlur = 0;
    if (selected) {
      ctx2d.strokeStyle = '#FFD700'; ctx2d.lineWidth = 3;
      ctx2d.shadowColor = '#FFD700'; ctx2d.shadowBlur = 16;
      ctx2d.beginPath(); ctx2d.arc(cx, cy, rr + 3, 0, Math.PI*2); ctx2d.stroke();
      ctx2d.shadowBlur = 0;
    }
  }
  ctx2d.restore();
}

function lightenHex(hex, amt) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.min(255,r+amt*255|0)+','+Math.min(255,g+amt*255|0)+','+Math.min(255,b+amt*255|0)+')';
}
function darkenHex(hex, amt) {
  var r=parseInt(hex.slice(1,3),16)||0, g=parseInt(hex.slice(3,5),16)||0, b=parseInt(hex.slice(5,7),16)||0;
  return 'rgb('+Math.max(0,r-amt*255|0)+','+Math.max(0,g-amt*255|0)+','+Math.max(0,b-amt*255|0)+')';
}

}

// ======================== 音效 ========================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function sfxLuo() {
  initAudio(); if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [[120,1.0],[180,0.4],[240,0.2],[360,0.1]].forEach(([freq,gain]) => {
    const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
    osc.type='sine'; osc.frequency.value=freq;
    g.gain.setValueAtTime(gain*0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.2);
    osc.connect(g); g.connect(audioCtx.destination); osc.start(t); osc.stop(t+1.2);
  });
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.04,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*(1-i/data.length);
  const noise=audioCtx.createBufferSource(), ng=audioCtx.createGain(), bpf=audioCtx.createBiquadFilter();
  ng.gain.value=0.15; bpf.type='bandpass'; bpf.frequency.value=300; bpf.Q.value=0.5;
  noise.buffer=buf; noise.connect(bpf); bpf.connect(ng); ng.connect(audioCtx.destination); noise.start(t);
}

function sfxGu() {
  initAudio(); if (!audioCtx) return;
  const t=audioCtx.currentTime;
  const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
  osc.type='sine'; osc.frequency.setValueAtTime(120,t); osc.frequency.exponentialRampToValueAtTime(45,t+0.08);
  g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  osc.connect(g); g.connect(audioCtx.destination); osc.start(t); osc.stop(t+0.5);
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.06,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/(data.length*0.3));
  const noise=audioCtx.createBufferSource(), ng=audioCtx.createGain(), lpf=audioCtx.createBiquadFilter();
  ng.gain.value=0.3; lpf.type='lowpass'; lpf.frequency.value=200;
  noise.buffer=buf; noise.connect(lpf); lpf.connect(ng); ng.connect(audioCtx.destination); noise.start(t);
  setTimeout(()=>{
    initAudio(); if (!audioCtx) return;
    const t2=audioCtx.currentTime, o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
    o2.type='sine'; o2.frequency.setValueAtTime(100,t2); o2.frequency.exponentialRampToValueAtTime(40,t2+0.06);
    g2.gain.setValueAtTime(0.35,t2); g2.gain.exponentialRampToValueAtTime(0.001,t2+0.4);
    o2.connect(g2); g2.connect(audioCtx.destination); o2.start(t2); o2.stop(t2+0.4);
  },120);
}

function sfxJinghu() {
  initAudio(); if (!audioCtx) return;
  const t=audioCtx.currentTime;
  const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
  osc.type='sawtooth'; osc.frequency.setValueAtTime(440,t); osc.frequency.exponentialRampToValueAtTime(880,t+0.15); osc.frequency.exponentialRampToValueAtTime(660,t+0.5);
  g.gain.setValueAtTime(0.0,t); g.gain.linearRampToValueAtTime(0.15,t+0.03); g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
  const hpf=audioCtx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=300;
  osc.connect(hpf); hpf.connect(g); g.connect(audioCtx.destination); osc.start(t); osc.stop(t+0.7);
  [[880,0.08],[1320,0.05],[1760,0.03]].forEach(([freq,vol])=>{
    const o=audioCtx.createOscillator(), gn=audioCtx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(freq,t);
    gn.gain.setValueAtTime(vol,t+0.03); gn.gain.exponentialRampToValueAtTime(0.001,t+0.6);
    o.connect(gn); gn.connect(audioCtx.destination); o.start(t); o.stop(t+0.7);
  });
}

function sfxSelect() {
  initAudio(); if (!audioCtx) return;
  const t=audioCtx.currentTime, o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='sine'; o.frequency.value=800; g.gain.setValueAtTime(0.05,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.1);
}

function sfxSkill() {
  initAudio(); if (!audioCtx) return;
  const t=audioCtx.currentTime;
  [220,330,440,550].forEach((freq,i)=>{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sawtooth'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.1,t+i*0.06); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.3);
    o.connect(g); g.connect(audioCtx.destination); o.start(t+i*0.06); o.stop(t+i*0.06+0.3);
  });
}

function sfxFail() {
  initAudio(); if (!audioCtx) return;
  const t=audioCtx.currentTime, o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(150,t+0.3);
  g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.35);
}

function sfxMatch(count) {
  if (count>=5) sfxJinghu();
  else if (count===4) sfxGu();
  else sfxLuo();
}

function sfxReshuffle() {
  initAudio(); if (!audioCtx) return;
  const t=audioCtx.currentTime;
  for(let i=0;i<6;i++){
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(200+i*80,t+i*0.05);
    g.gain.setValueAtTime(0.08,t+i*0.05); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.05+0.25);
    o.connect(g); g.connect(audioCtx.destination); o.start(t+i*0.05); o.stop(t+i*0.05+0.3);
  }
}

// ======================== 开场锣鼓 ========================
function sfxOpeningLuogu() {
  initAudio(); if (!audioCtx) return;
  const pattern = [
    {type:'luo', delay:0.0},{type:'gu', delay:0.25},{type:'luo', delay:0.5},
    {type:'gu', delay:0.7},{type:'luo', delay:0.95},{type:'gu', delay:1.1},
    {type:'luo', delay:1.25},{type:'gu', delay:1.35},{type:'luo', delay:1.5},
    {type:'luo', delay:1.65},{type:'gu', delay:1.75},
  ];
  pattern.forEach(({type, delay}) => {
    setTimeout(() => { if(type==='luo') sfxLuo(); else sfxGu(); }, delay * 1000);
  });
}

function playOpeningCurtain(levelIdx) {
  try {
    return new Promise(resolve => {
      var lv = LEVELS[levelIdx];
      var curtain = document.getElementById('stage-curtain');
      var cl = document.getElementById('curtain-left');
      var cr = document.getElementById('curtain-right');
      var title = document.getElementById('curtain-title');
      if (!curtain || !cl || !cr || !title) {
        console.warn('[curtain] DOM elements missing, skip');
        resolve(); return;
      }
      document.getElementById('ct-level-text').textContent = tf('level',[lv.level]);
      document.getElementById('ct-main-text').textContent  = lv.title;
      document.getElementById('ct-sub-text').textContent   = tf('needEliminate',[lv.masksTarget]);

      cl.style.transition = 'none'; cr.style.transition = 'none';
      cl.style.transform = 'translateX(0)'; cr.style.transform = 'translateX(0)';
      title.style.opacity = '0';
      curtain.classList.add('active');
      sfxOpeningLuogu();
      setTimeout(() => { title.style.opacity = '1'; }, 600);
      setTimeout(() => {
        cl.style.transition = 'transform 0.9s cubic-bezier(0.4,0,0.2,1)';
        cr.style.transition = 'transform 0.9s cubic-bezier(0.4,0,0.2,1)';
        cl.style.transform = 'translateX(-100%)';
        cr.style.transform = 'translateX(100%)';
        title.style.opacity = '0';
      }, 1800);
      setTimeout(() => {
        try {
          curtain.classList.remove('active');
          cl.style.transition = 'none'; cr.style.transition = 'none';
          resolve();
        } catch(e) { resolve(); }
      }, 2800);
    });
  } catch(e) {
    console.error('[curtain] exception:', e);
    return Promise.resolve();
  }
}

function getLevelConfig() { return LEVELS[currentLevel] || LEVELS[LEVELS.length-1]; }

function createGrid() {
  var overallLimit = 800;
  var overallAttempt = 0;

  while (overallAttempt < overallLimit) {
    overallAttempt++;

    // 步骤1：完全随机填充
    grid = [];
    for (var r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (var c = 0; c < COLS; c++) {
        grid[r][c] = Math.floor(Math.random() * ROLES.length);
      }
    }

    // 步骤2：逐格消除所有3连（置换为不会造成新3连的类型）
    var cascadeLimit = 500;
    var matches = findMatches();
    while (matches.length > 0 && cascadeLimit > 0) {
      cascadeLimit--;
      // 每次只处理一个匹配位置，降低震荡
      var m = matches[0];
      var oldType = grid[m.r][m.c];
      var newType = -1;
      // 尝试所有类型，选第一个不会造成3连的
      for (var t = 0; t < ROLES.length; t++) {
        if (t === oldType) continue;
        grid[m.r][m.c] = t;
        if (!wouldMatch(m.r, m.c, t)) { newType = t; break; }
      }
      if (newType === -1) {
        // 所有类型都被堵死（极端罕见），随机换一个
        grid[m.r][m.c] = (oldType + 1 + Math.floor(Math.random() * (ROLES.length - 1))) % ROLES.length;
      }
      matches = findMatches();
    }

    // 步骤3：检查是否可用
    if (matches.length === 0 && hasValidMoves()) return;
  }

  // 极端兜底：用确定性模式填充（保证无3连且有可消路径）
  for (var r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (var c = 0; c < COLS; c++) {
      grid[r][c] = (r * 3 + c * 2) % ROLES.length;
    }
  }
}

function wouldMatch(r,c,type) {
  // 检查在(r,c)放type是否会形成3消（同行/列同一类型≥3个，中间可以有空格但不能有其他脸谱阻断）
  // 水平方向
  var hPositions = [];
  for (var cc = 0; cc < COLS; cc++) {
    if (cc === c || grid[r][cc] === type) hPositions.push(cc);
  }
  if (hPositions.length >= 3) {
    // 找到c在hPositions中的位置，向左右扩展看是否与相邻同类型之间无阻断
    var idx = hPositions.indexOf(c);
    var left = idx;
    while (left > 0) {
      var blocked = false;
      for (var mid = hPositions[left-1]+1; mid < hPositions[left]; mid++) {
        if (grid[r][mid] !== -1) { blocked = true; break; }
      }
      if (blocked) break;
      left--;
    }
    var right = idx;
    while (right < hPositions.length-1) {
      var blocked = false;
      for (var mid = hPositions[right]+1; mid < hPositions[right+1]; mid++) {
        if (grid[r][mid] !== -1) { blocked = true; break; }
      }
      if (blocked) break;
      right++;
    }
    if (right - left + 1 >= 3) return true;
  }
  // 垂直方向
  var vPositions = [];
  for (var rr = 0; rr < ROWS; rr++) {
    if (rr === r || (grid[rr] && grid[rr][c] === type)) vPositions.push(rr);
  }
  if (vPositions.length >= 3) {
    var idx = vPositions.indexOf(r);
    var top = idx;
    while (top > 0) {
      var blocked = false;
      for (var mid = vPositions[top-1]+1; mid < vPositions[top]; mid++) {
        if (grid[mid] && grid[mid][c] !== -1) { blocked = true; break; }
      }
      if (blocked) break;
      top--;
    }
    var bottom = idx;
    while (bottom < vPositions.length-1) {
      var blocked = false;
      for (var mid = vPositions[bottom]+1; mid < vPositions[bottom+1]; mid++) {
        if (grid[mid] && grid[mid][c] !== -1) { blocked = true; break; }
      }
      if (blocked) break;
      bottom++;
    }
    if (bottom - top + 1 >= 3) return true;
  }
  return false;
}

function countRemaining() {
  var count = 0;
  for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) if (grid[r][c] !== -1) count++;
  return count;
}

// 按种类统计剩余脸谱，返回每种的数量数组 [sheng, dan, jing, mo, chou]
function countByType() {
  var counts = [0, 0, 0, 0, 0];
  for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
    var t = grid[r][c];
    if (t !== -1 && t >= 0 && t < 5) counts[t]++;
  }
  return counts;
}

// 通关条件：每种脸谱剩余数量 <= 2（即不存在某种脸谱剩余 >= 3 个），第2关起还需所有脸谱已落入棋盘
function checkWin() {
  var lv = getLevelConfig();
  // 第2关起：必须等所有脸谱都落下后才能判定胜利
  if (currentLevel > 0 && masksSpawned < lv.masksTarget) return false;
  var counts = countByType();
  for (var i = 0; i < counts.length; i++) {
    if (counts[i] >= 3) return false; // 有某种脸谱剩余 >= 3，还未过关
  }
  return true;
}

function hasValidMoves() {
  // 先检查通关条件：如果已经过关，不应该触发重排/失败
  if (checkWin()) return true;
  // 对每个脸谱，模拟将其拖到同行/同列的每个目标格，检查是否产生消除
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (grid[r][c] === -1) continue;
      // 模拟拖到同行的每个位置
      for (var tc = 0; tc < COLS; tc++) {
        if (tc === c) continue;
        // 临时执行 slidePiece
        slidePiece(r, c, r, tc);
        var m = findMatches().length > 0;
        slidePiece(r, tc, r, c); // 还原
        if (m) return true;
      }
      // 模拟拖到同列的每个位置
      for (var tr = 0; tr < ROWS; tr++) {
        if (tr === r) continue;
        slidePiece(r, c, tr, c);
        var m2 = findMatches().length > 0;
        slidePiece(tr, c, r, c); // 还原
        if (m2) return true;
      }
    }
  }
  return false;
}

function swap(r1,c1,r2,c2){var t=grid[r1][c1];grid[r1][c1]=grid[r2][c2];grid[r2][c2]=t;}

// 3消判定：同行/列同一类型≥3个即视为匹配，中间可以有空格但不能有其他脸谱阻断
function findMatches() {
  var matched = new Set();
  // 水平：逐行按类型收集位置，分组（组内只有空格无其他脸谱）
  for (var r = 0; r < ROWS; r++) {
    var typeCols = {};
    for (var c = 0; c < COLS; c++) {
      var t = grid[r][c];
      if (t === -1) continue;
      if (!typeCols[t]) typeCols[t] = [];
      typeCols[t].push(c);
    }
    for (var key in typeCols) {
      var cols = typeCols[key];
      if (cols.length < 3) continue;
      var start = 0; // 当前组的起始索引
      for (var i = 1; i <= cols.length; i++) {
        var broken = false;
        if (i < cols.length) {
          for (var mid = cols[i-1]+1; mid < cols[i]; mid++) {
            if (grid[r][mid] !== -1) { broken = true; break; }
          }
        }
        if (broken || i === cols.length) {
          if (i - start >= 3) {
            for (var j = start; j < i; j++) matched.add(r + ',' + cols[j]);
          }
          start = i;
        }
      }
    }
  }
  // 垂直：逐列按类型收集位置
  for (var c = 0; c < COLS; c++) {
    var typeRows = {};
    for (var r = 0; r < ROWS; r++) {
      var t = grid[r][c];
      if (t === -1) continue;
      if (!typeRows[t]) typeRows[t] = [];
      typeRows[t].push(r);
    }
    for (var key in typeRows) {
      var rows = typeRows[key];
      if (rows.length < 3) continue;
      var start = 0;
      for (var i = 1; i <= rows.length; i++) {
        var broken = false;
        if (i < rows.length) {
          for (var mid = rows[i-1]+1; mid < rows[i]; mid++) {
            if (grid[mid] && grid[mid][c] !== -1) { broken = true; break; }
          }
        }
        if (broken || i === rows.length) {
          if (i - start >= 3) {
            for (var j = start; j < i; j++) matched.add(rows[j] + ',' + c);
          }
          start = i;
        }
      }
    }
  }
  var result = Array.from(matched).map(function(s){var p=s.split(',');return{r:parseInt(p[0]),c:parseInt(p[1])};});
  // 调试：打印每行每列的类型分布（仅在找到匹配或疑似漏检时触发）
  if (result.length > 0) {
    var typeNames = ['生','旦','净','末','丑'];
    var summary = [];
    for (var rr = 0; rr < ROWS; rr++) {
      var rowStr = '';
      for (var cc = 0; cc < COLS; cc++) {
        var tt = grid[rr][cc];
        rowStr += (tt === -1 ? '_' : typeNames[tt]) + ' ';
      }
      summary.push('  row'+rr+': [' + rowStr.trim() + ']');
    }
    console.log('[findMatches] found '+result.length+' matches:\n' + summary.join('\n') + '\n  matched: ' + result.map(function(m){return '('+m.r+','+m.c+')'+typeNames[grid[m.r][m.c]];}).join(' '));
  }
  return result;
}

function refillEmptyCells() {
  // 第1关（currentLevel===0）：空位不补充，脸谱越来越少直至棋盘变空
  if (currentLevel === 0) return;
  // 第2关起：空位从上方落入新脸谱补充，但不超过关卡目标总数
  var lv = getLevelConfig();
  var remaining = lv.masksTarget - masksSpawned;
  if (remaining <= 0) return;
  for (var c = 0; c < COLS; c++) {
    for (var r = 0; r < ROWS; r++) {
      if (grid[r][c] === -1 && remaining > 0) {
        grid[r][c] = Math.floor(Math.random() * ROLES.length);
        masksSpawned++; remaining--;
      }
    }
  }
}

function processMatches(matches) {
  console.log('[processMatches] ENTER: '+matches.length+' matches');
  var maxLen=0;
  var byType={};
  matches.forEach(function(m){
    var type=grid[m.r][m.c];
    if(!byType[type]) byType[type]=0;
    byType[type]++; maxLen=Math.max(maxLen,byType[type]);
  });
  // 计分
  matches.forEach(function(m){
    var type=grid[m.r][m.c], len=byType[type];
    score+=len===3?15:len===4?40:len===5?100:len*25;
    energy=Math.min(100,energy+(len===3?5:len===4?12:len>=5?20:len*4));
    if(len>=4) showCombo(len,m.r,m.c);
  });
  // 累计脸谱消除数
  masksEliminated += matches.length;
  matches.forEach(function(m){grid[m.r][m.c]=-1;});
  updateUI();
  return maxLen;
}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function playTurn(r1,c1,r2,c2) {
  if(animating||gameOver) return;
  if(selectedSkill){useSkill(selectedSkill,r1,c1);return;}
  initAudio();
  swap(r1,c1,r2,c2);
  var matches=findMatches();
  if(matches.length===0){swap(r1,c1,r2,c2);sfxFail();showMessage('[点] ('+r1+','+c1+')<->('+r2+','+c2+') 无匹配!');return;}
  stepCount++;
  showMessage('[点] 匹配='+matches.length+' 消除中...');
  animating=true; selected=null; _animatingSince=Date.now(); updateUI();
  try {
    await animateSwap(r1,c1,r2,c2);
    console.log('[chain] after animateSwap, matches='+matches.length);
    var safetyRounds=0;
    while(matches.length>0||safetyRounds<3) {
      if(matches.length===0){
        safetyRounds++;
        matches=findMatches();
        console.log('[chain] safetyRound='+safetyRounds+' recheck matches='+matches.length);
        if(matches.length===0) break;
      }
      console.log('[chain] ROUND start, matches='+matches.length);
      var maxLen=processMatches(matches); sfxMatch(maxLen);
      console.log('[chain] after processMatches, maxLen='+maxLen);
      await animateClear(); console.log('[chain] after animateClear');
      refillEmptyCells(); console.log('[chain] after refillEmptyCells');
      await animateDrop(); console.log('[chain] after animateDrop');
      drawBoard(); await sleep(180);
      matches=findMatches();
      console.log('[chain] after findMatches, new matches='+matches.length);
    }
    drawBoard();
    if(checkWin()) { endGame(true); return; }
    if(!hasValidMoves()) {
      if(reshufflesLeft > 0) { showReshuffleModal(); }
      else { endGame(false); }
      return;
    }
    animating=false; updateUI();
  } catch(err) {
    console.error('[playTurn] FATAL error:', err);
    showMessage('消除出错，已自动恢复');
    animating=false; drawBoard(); updateUI();
  }
  console.log('[playTurn] EXIT, animating='+animating);
}

  } else {
    adBtn.style.display = 'none';
  }
  document.getElementById('reshuffle-modal').classList.add('show');
}

function closeReshuffleModal() {
  document.getElementById('reshuffle-modal').classList.remove('show');
  animating = false; _animatingSince = 0;
  endGame(false);
}

function doReshuffle(needsAd) {
  document.getElementById('reshuffle-modal').classList.remove('show');
  if (needsAd) {
    // 模拟看广告（实际部署时接入广告SDK）
    showMessage('正在播放广告…');
    setTimeout(function() {
      executeReshuffle();
      showMessage('广告结束，棋盘已重排！');
    }, 1500);
  } else {
    executeReshuffle();
    showMessage('棋盘已重排！');
  }
}

function executeReshuffle() {
  reshufflesLeft--;
  reshuffleUsed++;
  sfxReshuffle();
  // 只打乱棋盘上剩余脸谱的位置，不补充新脸谱、不触发连锁消除
  var shuffleAttempts = 0;
  var ok = false;
  while (shuffleAttempts < 200 && !ok) {
    shuffleBoard();
    if (hasValidMoves()) {
      ok = true;
    }
    shuffleAttempts++;
  }
  // 极端情况下（200次都无解），保持最后一次打乱结果交给用户处理
  drawBoard();
  // 重排后检查是否意外出现了可消匹配，有则自动连锁消除
  var afterShuffleMatches = findMatches();
  if (afterShuffleMatches.length > 0) {
    console.log('[reshuffle] found ' + afterShuffleMatches.length + ' matches, auto-clearing...');
    animating = true; _animatingSince = Date.now();
    (async function() {
      var safetyRounds = 0;
      var matches = afterShuffleMatches;
      while (matches.length > 0 || safetyRounds < 3) {
        if (matches.length === 0) {
          safetyRounds++;
          matches = findMatches();
          if (matches.length === 0) { console.log('[reshuffle-chain] safety confirmed'); break; }
        }
        var maxLen = processMatches(matches); sfxMatch(maxLen);
        await animateClear(); refillEmptyCells(); await animateDrop(); drawBoard(); await sleep(180);
        matches = findMatches();
      }
      drawBoard();
      if (checkWin()) { endGame(true); return; }
      if (!hasValidMoves()) {
        if (reshufflesLeft > 0) { showReshuffleModal(); }
        else { endGame(false); }
        return;
      }
      animating = false; _animatingSince = 0; updateUI();
    })();
  } else {
    animating = false; _animatingSince = 0;
    updateUI();
  }
}

function shuffleBoard() {
  var pieces=[], positions=[];
  for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++) {
    if(grid[r][c]!==-1){pieces.push(grid[r][c]);positions.push({r:r,c:c});}
  }
  for(var i=pieces.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pieces[i];pieces[i]=pieces[j];pieces[j]=t;}
  for(var i=0;i<pieces.length;i++){grid[positions[i].r][positions[i].c]=pieces[i];}
}

function selectSkill(skill) {

  if(energy<30){showMessage('能量不足！需要30点');sfxFail();return;}

  showMessage(msgs[skill]);
}

function cancelSkill() {
  selectedSkill=null;
  document.querySelectorAll('.skill-btn').forEach(function(b){b.classList.remove('skill-selected');});

function useSkill(skill,row,col) {
  if(energy<30) return;
  animating=true; energy-=30; sfxSkill();
  switch(skill) {
    case 'sheng': for(var c=0;c<COLS;c++) grid[row][c]=-1; showMessage('生·长缨横扫！'); break;
    case 'dan': for(var r=0;r<ROWS;r++) grid[r][col]=-1; showMessage('旦·水袖轻拂！'); break;
    case 'jing':
      for(var dr=-1;dr<=1;dr++) for(var dc=-1;dc<=1;dc++) {
        var nr=row+dr,nc=col+dc; if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) grid[nr][nc]=-1;
      }
      score+=150; showMessage('净·花脸震天！'); break;
    case 'mo': showMessage('末·老生点兵！步数无限，尽情畅玩！'); break;
    case 'chou': shuffleBoard(); showMessage('丑·丑角逗趣！'); break;
  }
  // 技能清理也算消除（生/旦/净一行一列全部消除）
  var countBefore = masksEliminated;
  // 计算实际被清除的棋子数
  var cleared = 0;
  for(var rr=0;rr<ROWS;rr++) for(var cc=0;cc<COLS;cc++) if(grid[rr][cc]===-1) cleared++;
  // 注意：-1的格子被refillEmptyCells填充后会变回数字，这里要赶在refill前计数
  // 直接在setToDone前计算：遍历grid中-1的数量
  masksEliminated += cleared;
  selectedSkill=null;
  document.querySelectorAll('.skill-btn').forEach(function(b){b.classList.remove('skill-selected');});
  refillEmptyCells(); drawBoard(); updateUI();
  setTimeout(function(){
    var matches=findMatches();
    (async function(){
      while(matches.length>0){
        var maxLen=processMatches(matches);sfxMatch(maxLen);
        await animateClear();refillEmptyCells();await animateDrop();drawBoard();await sleep(180);matches=findMatches();
      }
      animating=false;
      if(checkWin()){endGame(true);return;}
      if(!hasValidMoves()){
        if(reshufflesLeft>0){showReshuffleModal();}
        else{endGame(false);}
        return;
      }
      updateUI(); hideMessage();
    })();
  },400);
}

// ======================== 动画 ========================
async function animateSwap(r1,c1,r2,c2) {
  var x1=c1*CELL+CELL/2,y1=r1*CELL+CELL/2,x2=c2*CELL+CELL/2,y2=r2*CELL+CELL/2;
  var t1=grid[r2][c2],t2=grid[r1][c1];
  try {
  for(var t=0;t<=8;t++){
    drawBoard();
    var prog=t/8;
    drawFaceMask(ctx,x1+(x2-x1)*prog,y1+(y2-y1)*prog,CELL*0.38,ROLES[t1],false,t1);
    drawFaceMask(ctx,x2+(x1-x2)*prog,y2+(y1-y2)*prog,CELL*0.38,ROLES[t2],false,t2);
    await sleep(16);
  }
  } catch(e) { console.error('[animateSwap] draw error (non-fatal):', e); }
}
async function animateClear(){console.log('[animateClear] ENTER');for(var t=0;t<4;t++){drawBoard(t%2===0?'rgba(255,255,255,0.2)':null);await sleep(40);} console.log('[animateClear] DONE');}
async function animateDrop(){console.log('[animateDrop] ENTER');drawBoard();await sleep(100); console.log('[animateDrop] DONE');}

function drawBoard(flash) {
  try {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#2d1a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = 'rgba(180,140,60,0.15)';
    ctx.lineWidth = 0.8;
    for (var i = 0; i <= COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
    }
    // 拖拽高亮：起点框 + 目标高亮
    var dragSrcR = -1, dragSrcC = -1, dragDstR = -1, dragDstC = -1;
    if (dragState.active) {
      dragSrcR = dragState.startRow; dragSrcC = dragState.startCol;
      if (dragState.locked) {
        dragDstR = dragState.curRow; dragDstC = dragState.curCol;
        if (dragSrcR === dragDstR && dragSrcC === dragDstC) { dragDstR = dragDstC = -1; }
      }
    }
    // 绘制所有棋子（拖拽的起点棋子跳过，后面单独画到目标位置）
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var type = grid[r][c];
        if (type === -1) continue;
        // 拖拽中的起点棋子：画淡色虚影在原位
        if (dragSrcR === r && dragSrcC === c) {
          ctx.globalAlpha = 0.3;
          var role2 = ROLES[type];
          if (role2) drawFaceMask(ctx, c * CELL + CELL / 2, r * CELL + CELL / 2, CELL * 0.38, role2, false, type);
          ctx.globalAlpha = 1;
          continue;
        }
        var role = ROLES[type];
        if (!role) continue;
        var cx2 = c * CELL + CELL / 2, cy2 = r * CELL + CELL / 2;
        var isSel = selected && selected.row === r && selected.col === c;
        drawFaceMask(ctx, cx2, cy2, CELL * 0.38, role, isSel, type);
      }
    }
    // 拖拽：起点框 + 目标虚影
    if (dragSrcR >= 0 && dragDstR >= 0) {
      // 起点金色虚线框
      ctx.save();
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3; ctx.setLineDash([6, 3]);
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.rect(dragSrcC * CELL + 2, dragSrcR * CELL + 2, CELL - 4, CELL - 4); ctx.stroke();
      ctx.shadowBlur = 0;
      // 目标亮框
      ctx.strokeStyle = 'rgba(255,215,0,0.7)'; ctx.lineWidth = 2.5; ctx.setLineDash([]);
      ctx.beginPath(); ctx.rect(dragDstC * CELL + 1, dragDstR * CELL + 1, CELL - 2, CELL - 2); ctx.stroke();
      // 目标位置画拖拽中的棋子（实色）
      var srcType = grid[dragState.startRow][dragState.startCol];
      if (srcType !== -1) {
        var srcRole = ROLES[srcType];
        if (srcRole) drawFaceMask(ctx, dragDstC * CELL + CELL / 2, dragDstR * CELL + CELL / 2, CELL * 0.38, srcRole, true, srcType);
      }
      // 连线箭头指示
      var sx = dragSrcC * CELL + CELL / 2, sy = dragSrcR * CELL + CELL / 2;
      var ex = dragDstC * CELL + CELL / 2, ey = dragDstR * CELL + CELL / 2;
      ctx.strokeStyle = 'rgba(255,215,0,0.3)'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    } else if (dragSrcR >= 0) {
      // 尚未拖出方向，仅高亮起点
      ctx.save();
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2.5;
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.rect(dragSrcC * CELL + 2, dragSrcR * CELL + 2, CELL - 4, CELL - 4); ctx.stroke();
      ctx.shadowBlur = 0; ctx.restore();
    }
    if (flash) { ctx.fillStyle = flash; ctx.fillRect(0, 0, canvas.width, canvas.height); }
  } catch (e) { console.error('drawBoard error:', e); }
}

async function startLevel(skipCurtain) {
  var lv=getLevelConfig();
  score=0; stepCount=0; masksTotal=lv.masksTarget; masksEliminated=0; masksSpawned=64;
  energy=0;
  reshufflesLeft=1; reshuffleUsed=0;
  selected=null; selectedSkill=null; gameOver=false; animating=true;
  cancelSkill(); createGrid(); updateUI();
  document.getElementById('toast').className='';
  hideMessage();
  if (!skipCurtain) {
    initAudio();
    await playOpeningCurtain(currentLevel);
  }
  animating=false;
  drawBoard();
  showMessage(tf('startMsg',[lv.level,lv.title]));
}

function resetLevel() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('reshuffle-modal').classList.remove('show');
  overlayAction='retry';
  startLevel(true);
}

// ======================== 输入（点击选择 + 拖拽跨格直行） ========================
// dragState: { active, startRow, startCol, curRow, curCol, dir, locked }
// dir: 'h' 水平 / 'v' 垂直 / null 未锁定
// 拖拽直行：沿行或列滑动棋子到目标位置，中间棋子依次移位
let dragState = {
  active: false, startRow: -1, startCol: -1,
  curRow: -1, curCol: -1, dir: null, locked: false
};
let dragMovedEnough = false; // 是否已拖过阈值，区分点击和拖拽

function getCellFromEvent(e, touchIdx) {
  var rect = canvas.getBoundingClientRect();
  var clientX, clientY;
  if (touchIdx !== undefined) {
    clientX = e.touches[touchIdx].clientX; clientY = e.touches[touchIdx].clientY;
  } else {
    clientX = e.clientX; clientY = e.clientY;
  }
  var x = (clientX - rect.left) * (canvas.width / rect.width);
  var y = (clientY - rect.top) * (canvas.height / rect.height);
  return { col: Math.floor(x / CELL), row: Math.floor(y / CELL), x: x, y: y };
}

// 将棋子从 (r1,c1) 滑到 (r2,c2)，中间棋子依次移位。要求同行或同列。
function slidePiece(r1, c1, r2, c2) {
  if (r1 === r2 && c1 === c2) return;
  var piece = grid[r1][c1];
  if (r1 === r2) {
    var d = c2 > c1 ? 1 : -1;
    for (var c = c1; c !== c2; c += d) { grid[r1][c] = grid[r1][c + d]; }
    grid[r1][c2] = piece;
  } else if (c1 === c2) {
    var d = r2 > r1 ? 1 : -1;
    for (var r = r1; r !== r2; r += d) { grid[r][c1] = grid[r + d][c1]; }
    grid[r2][c1] = piece;
  }
}

function handlePointerDown(cell) {
  if (cell.row < 0 || cell.row >= ROWS || cell.col < 0 || cell.col >= COLS) return;
  if (grid[cell.row][cell.col] === -1) return; // 空格子不响应
  console.log('[PTR-DOWN] start=('+cell.row+','+cell.col+') type='+grid[cell.row][cell.col]+' skill='+selectedSkill);

  // 技能模式
  if (selectedSkill) {
    if (selectedSkill === 'mo') { useSkill('mo', 0, 0); return; }
    useSkill(selectedSkill, cell.row, cell.col); return;
  }

  // 开始拖拽追踪（保留 selected 状态，由 mouseup 统一处理）
  dragState.active = true;
  dragState.startRow = cell.row; dragState.startCol = cell.col;
  dragState.curRow = cell.row; dragState.curCol = cell.col;
  dragState.dir = null; dragState.locked = false;
  dragMovedEnough = false;
  sfxSelect(); drawBoard();
}

function handlePointerMove(e, touchIdx) {
  if (!dragState.active || animating || gameOver) return;
  var cell = getCellFromEvent(e, touchIdx);
  var dx = cell.x - (dragState.startCol * CELL + CELL / 2);
  var dy = cell.y - (dragState.startRow * CELL + CELL / 2);
  var threshold = CELL * 0.15;

  // 方向锁定：第一次超过阈值时锁定水平/垂直方向
  if (!dragState.locked) {
    if (Math.abs(dx) > threshold && Math.abs(dx) >= Math.abs(dy)) {
      dragState.dir = 'h'; dragState.locked = true; dragMovedEnough = true;
      console.log('[PTR-MOVE] LOCKED h: dx='+dx.toFixed(1)+' thresh='+threshold.toFixed(1)+' start=('+dragState.startRow+','+dragState.startCol+') curCell=('+cell.row+','+cell.col+')');
    } else if (Math.abs(dy) > threshold) {
      dragState.dir = 'v'; dragState.locked = true; dragMovedEnough = true;
      console.log('[PTR-MOVE] LOCKED v: dy='+dy.toFixed(1)+' thresh='+threshold.toFixed(1)+' start=('+dragState.startRow+','+dragState.startCol+') curCell=('+cell.row+','+cell.col+')');
    } else {
      return; // 还没拖到阈值，不更新
    }
  }

  // 已锁定方向：计算约束位置
  if (dragState.dir === 'h') {
    dragState.curRow = dragState.startRow;
    dragState.curCol = Math.max(0, Math.min(COLS - 1, cell.col));
  } else {
    dragState.curCol = dragState.startCol;
    dragState.curRow = Math.max(0, Math.min(ROWS - 1, cell.row));
  }
  drawBoard();
}

function handlePointerUp() {
  if (!dragState.active) return;
  console.log('[PTR-UP] active dragState: start=('+dragState.startRow+','+dragState.startCol+') cur=('+dragState.curRow+','+dragState.curCol+') movedEnough='+dragMovedEnough+' animating='+animating);

  var sr = dragState.startRow, sc = dragState.startCol;
  var tr = dragState.curRow, tc = dragState.curCol;
  var handledByDrag = false; // 标记是否由拖拽+消除异步路径接管

  if (dragMovedEnough && (tr !== sr || tc !== sc)) {
    // 拖拽结束：执行跨格直行滑动（允许拖到空格）
    slidePiece(sr, sc, tr, tc);
    initAudio();
    // 滑动后检查是否有消除
    var matches = findMatches();
    var dbgInfo = '[拖] ('+sr+','+sc+')->('+tr+','+tc+') 匹配='+matches.length;
    console.log('[drag] slide ('+sr+','+sc+')->('+tr+','+tc+'), matches='+matches.length,
      matches.map(function(m){return '('+m.r+','+m.c+')'+grid[m.r][m.c];}).join(' '));
    showMessage(dbgInfo);
    if (matches.length > 0) {
      stepCount++; updateUI(); // 拖拽滑动算一步
      handledByDrag = true; // 异步路径接管，不执行末尾冗余绘制
      dragState.active = false; dragState.dir = null; dragState.locked = false;
      animating = true; _animatingSince = Date.now();
      (async function() {
        try {
          var chainRound = 0;
          var safetyRounds = 0;
          console.log('[drag-chain] START, matches='+matches.length);
          while (matches.length > 0 || safetyRounds < 3) {
            if (matches.length === 0) {
              safetyRounds++;
              matches = findMatches();
              console.log('[drag-chain] safetyRound='+safetyRounds+' recheck matches='+matches.length);
              if (matches.length === 0) { console.log('[drag-chain] safetyExit'); break; }
            }
            chainRound++;
            console.log('[drag-chain] ROUND #'+chainRound+' matches='+matches.length);
            var maxLen = processMatches(matches); sfxMatch(maxLen);
            console.log('[drag-chain] after processMatches maxLen='+maxLen);
            await animateClear(); console.log('[drag-chain] after animateClear');
            refillEmptyCells(); console.log('[drag-chain] after refillEmptyCells');
            await animateDrop(); console.log('[drag-chain] after animateDrop');
            drawBoard(); await sleep(180);
            matches = findMatches();
            console.log('[drag-chain] after findMatches new matches='+matches.length);
          }
          drawBoard();
          if (checkWin()) { endGame(true); return; }
          if (!hasValidMoves()) {
            if (reshufflesLeft > 0) { showReshuffleModal(); }
            else { endGame(false); }
            return;
          }
          animating = false; _animatingSince = 0; updateUI();
        } catch(err) {
          console.error('[chain] FATAL error:', err);
          animating = false; _animatingSince = 0; drawBoard(); updateUI();
        }
      })();
    } else {
      // 无消除，还原
      slidePiece(tr, tc, sr, sc);
      sfxFail();
      showMessage('[拖] 无匹配! 已还原');
      animating = false; _animatingSince = 0;
      // 检查是否卡死：无消除且无合法移动 → 触发重排或结束
      if (!hasValidMoves()) {
        if (reshufflesLeft > 0) {
          showReshuffleModal();
        } else {
          endGame(false);
        }
        handledByDrag = true; // 跳过末尾绘制（弹窗已接管）
      }
    }
  } else {
    // 点击（没拖够阈值）：处理选中逻辑
    if (grid[sr][sc] === -1) { /* skip */ }
    else {
      if (selected && selected.row === sr && selected.col === sc) {
        selected = null; // 再次点击取消选中
      } else if (selected) {
        var dr = Math.abs(selected.row - sr), dc = Math.abs(selected.col - sc);
        if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
          var pr = selected.row, pc = selected.col;
          selected = null; dragState.active = false; drawBoard();
          playTurn(pr, pc, sr, sc); return;
        } else {
          selected = { row: sr, col: sc };
        }
      } else {
        selected = { row: sr, col: sc };
      }
    }
  }

  // 仅当不是拖拽+消除路径时才执行末尾绘制（避免和异步动画冲突）
  if (!handledByDrag) {
    dragState.active = false; dragState.dir = null; dragState.locked = false;
    drawBoard(); updateUI();
  }
}

// --- 鼠标事件 ---
var _animatingSince = 0; // 时间戳：animating 从何时开始
canvas.addEventListener('mousedown', function(e) {
  console.log('[mousedown] animating='+animating+' gameOver='+gameOver);
  if (animating || gameOver) {
    // 自愈：animating 超过10秒未恢复，强制重置
    if (animating && _animatingSince > 0 && Date.now() - _animatingSince > 10000) {
      console.warn('[fix] animating stuck >10s, force reset');
      animating = false; _animatingSince = 0; _animatingSince = 0; drawBoard(); updateUI();
    }
    // 如果 gameOver 意外卡住, 强制恢复
    if (gameOver && !animating && !document.getElementById('stage-curtain').classList.contains('active')) {
      console.warn('[fix] gameOver stuck, force reset');
      gameOver = false; animating = false; _animatingSince = 0;
    } else { return; }
  }
  if (document.getElementById('reshuffle-modal').classList.contains('show')) return;
  if (document.getElementById('overlay').classList.contains('show')) return;
  initAudio();
  handlePointerDown(getCellFromEvent(e));
});

canvas.addEventListener('mousemove', function(e) {
  handlePointerMove(e);
});

canvas.addEventListener('mouseup', handlePointerUp);
canvas.addEventListener('mouseleave', handlePointerUp);

// --- 触摸事件 ---
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (animating || gameOver) return;
  if (document.getElementById('reshuffle-modal').classList.contains('show')) return;
  if (document.getElementById('overlay').classList.contains('show')) return;
  initAudio();
  handlePointerDown(getCellFromEvent(e, 0));
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  handlePointerMove(e, 0);
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  handlePointerUp();
}, { passive: false });

// polyfill roundRect
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r2){
    this.beginPath();
    this.moveTo(x+r2,y);this.lineTo(x+w-r2,y);this.arcTo(x+w,y,x+w,y+r2,r2);this.lineTo(x+w,y+h-r2);
    this.arcTo(x+w,y+h,x+w-r2,y+h,r2);this.lineTo(x+r2,y+h);this.arcTo(x,y+h,x,y+h-r2,r2);this.lineTo(x,y+r2);
    this.arcTo(x,y,x+r2,y,r2);this.closePath();return this;
  };
}

// ======================== 启动 ========================
drawSkillIcons();
(function() {
  // 恢复进度
  currentLevel = loadProgress();
  var lv = getLevelConfig();
  score=0; masksTotal=lv.masksTarget; masksEliminated=0; masksSpawned=64;
  energy=0; reshufflesLeft=1; reshuffleUsed=0;
  selected=null; selectedSkill=null; gameOver=true; animating=false;
  createGrid(); drawBoard(); updateUI();
  if (currentLevel === 0) {
    showMessage('点击棋盘，不限步数，消到每种脸谱≤2个即可通关');
  } else {
    showMessage('欢迎回来！当前第' + lv.level + '关：' + lv.title);
  }
  var curtainStarted = false;
  var firstClickHandler = function() {
    if (curtainStarted) return;
    curtainStarted = true;
    canvas.removeEventListener('mousedown', firstClickHandler);
    hideMessage();
    initAudio();

    // 非第1关：恢复进度，跳过开幕动画直接开始
    if (currentLevel > 0) {
      gameOver = false; animating = false; _animatingSince = 0;
      drawBoard();
      showMessage('第' + lv.level + '关：' + lv.title);
      return;
    }

    // 第1关：播开幕动画
    try {
      console.log('[firstClick] starting curtain');
      gameOver = true; animating = true;
      var curtainPromise = playOpeningCurtain(0);
      if (!curtainPromise || !curtainPromise.then) {
        console.warn('[firstClick] curtain promise invalid, skip');
        gameOver = false; animating = false; _animatingSince = 0;
        drawBoard();
        showMessage('第1关：' + lv.title + '　不限步数，消到每种脸谱≤2个');
        return;
      }
      curtainPromise.then(function() {
        console.log('[firstClick] curtain done');
        gameOver = false; animating = false; _animatingSince = 0;
        drawBoard();
        showMessage('第1关：' + lv.title + '　不限步数，消到每种脸谱≤2个');
      }).catch(function(err) {
        console.error('[firstClick] curtain error:', err);
        gameOver = false; animating = false; _animatingSince = 0;
        drawBoard();
        showMessage('第1关：' + lv.title + '　不限步数，消到每种脸谱≤2个');
      });
    } catch(e) {
      console.error('[firstClick] exception:', e);
      gameOver = false; animating = false; _animatingSince = 0;
      drawBoard();
      showMessage('第1关：' + lv.title + '　不限步数，消到每种脸谱≤2个');
    }
  };
  canvas.addEventListener('mousedown', firstClickHandler);

  // 安全阀：5秒后如果还没点击，强制开始（跳过动画）
  setTimeout(function() {
    if (gameOver && !curtainStarted) {
      console.log('[auto] no click detected, skip curtain');
      curtainStarted = true;
      try { canvas.removeEventListener('mousedown', firstClickHandler); } catch(e) {}
      hideMessage();
      gameOver = false; animating = false; _animatingSince = 0;
      initAudio(); drawBoard();
      showMessage((currentLevel === 0 ? '第1关：' : '第' + lv.level + '关：') + lv.title);
    }
    if (gameOver && !document.getElementById('stage-curtain').classList.contains('active')) {
      console.warn('[auto] gameOver stuck, force reset');
      gameOver = false; animating = false; _animatingSince = 0;
      drawBoard();
    }
  }, 5000);
})();
</script>
