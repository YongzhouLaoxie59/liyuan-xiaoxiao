<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>梨园消消 — 京剧脸谱三消游戏</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 40%, #1a0a2e 100%);
  min-height: 100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  overflow: hidden; position: relative;
}
/* 背景装饰 */
body::before {
  content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
  background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 60%);
  animation: glow 8s ease-in-out infinite alternate;
}
@keyframes glow { from{transform:rotate(0deg) scale(1);} to{transform:rotate(180deg) scale(1.1);} }

@keyframes fadeUp { from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:translateY(0);} }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.03);} }

.container {
  position: relative; z-index:1; text-align:center;
  animation: fadeUp 0.8s ease-out;
  width: 90%; max-width: 360px;
}

/* 标题 */
.title {
  font-size: 42px; font-weight: 900;
  background: linear-gradient(180deg, #ffd700 0%, #ff8c00 50%, #ff4500 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 2px 8px rgba(255,165,0,0.5));
  margin-bottom: 6px; letter-spacing: 6px;
}
.subtitle {
  font-size: 15px; color: rgba(255,215,0,0.7);
  letter-spacing: 10px; margin-bottom: 40px;
}

/* 京剧脸谱图标 */
.mask-icon {
  width: 100px; height: 100px; margin: 0 auto 30px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
  animation: pulse 3s ease-in-out infinite;
}

/* 按钮 */
.btn-group { display:flex; flex-direction:column; gap:16px; }
.mode-btn {
  display:flex; align-items:center; justify-content:center; gap:12px;
  padding: 18px 24px; border-radius: 16px; border: 2px solid;
  font-size: 20px; font-weight:700; cursor:pointer;
  transition: all 0.3s; text-decoration:none;
  position: relative; overflow: hidden;
}
.mode-btn::before {
  content:''; position:absolute; inset:0;
  opacity:0; transition: opacity 0.3s;
}
.mode-btn:active::before { opacity:1; }

/* 普通模式按钮 */
.btn-normal {
  background: linear-gradient(135deg, rgba(255,215,0,0.12) 0%, rgba(255,140,0,0.08) 100%);
  border-color: rgba(255,215,0,0.4); color: #ffd700;
}
.btn-normal::before { background: rgba(255,215,0,0.1); }
.btn-normal:hover, .btn-normal:active {
  background: linear-gradient(135deg, rgba(255,215,0,0.22) 0%, rgba(255,140,0,0.15) 100%);
  border-color: rgba(255,215,0,0.7);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(255,215,0,0.2);
}
.btn-normal .icon { font-size:26px; }

/* 难度模式按钮 */
.btn-hard {
  background: linear-gradient(135deg, rgba(0,191,255,0.12) 0%, rgba(0,105,255,0.08) 100%);
  border-color: rgba(100,200,255,0.4); color: #64c8ff;
}
.btn-hard::before { background: rgba(100,200,255,0.1); }
.btn-hard:hover, .btn-hard:active {
  background: linear-gradient(135deg, rgba(0,191,255,0.22) 0%, rgba(0,105,255,0.15) 100%);
  border-color: rgba(100,200,255,0.7);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(100,200,255,0.2);
}
.btn-hard .icon { font-size:24px; }

/* 底部说明 */
.footer {
  margin-top: 36px; font-size: 12px;
  color: rgba(255,255,255,0.25); letter-spacing: 1px;
}
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  margin: 0 4px;
}
</style>
</head>
<body>

<div class="container">
  <div class="mask-icon">🎭</div>
  <div class="title">梨园消消</div>
  <div class="subtitle">京剧脸谱三消</div>

  <div class="btn-group">
    <a class="mode-btn btn-normal" href="normal.html">
      <span class="icon">😊</span>
      <div style="text-align:left;">
        <div>普通模式</div>
        <div style="font-size:12px;font-weight:400;opacity:0.65;margin-top:2px;">经典三消 · 轻松闯关</div>
      </div>
    </a>
    <a class="mode-btn btn-hard" href="hard.html">
      <span class="icon">❄️</span>
      <div style="text-align:left;">
        <div>难度模式</div>
        <div style="font-size:12px;font-weight:400;opacity:0.65;margin-top:2px;">冻结格 · 第5关起挑战</div>
      </div>
    </a>
  </div>

  <div class="footer">
    <span class="badge">生旦净末丑</span>
    <span class="badge">15关</span>
  </div>
</div>

</body>
</html>
