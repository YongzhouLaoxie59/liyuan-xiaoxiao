<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梨园消消 · 内测反馈</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:#1a0a0a; color:#e8d5b7; }
  
  .container { max-width:800px; margin:0 auto; padding:20px 16px 60px; }
  
  .header { text-align:center; padding:32px 0 24px; }
  .header h1 { font-size:28px; color:#c9a84c; letter-spacing:4px; margin-bottom:8px; }
  .header .sub { font-size:14px; color:#8a7555; }
  
  .section-title { font-size:18px; color:#c9a84c; border-left:3px solid #c9a84c; 
    padding-left:12px; margin:32px 0 16px; font-weight:bold; }
  
  /* 游戏卡片 */
  .game-cards { display:flex; gap:16px; flex-wrap:wrap; }
  .game-card { flex:1; min-width:240px; background:#2a1a10; border:1px solid #4a3a2a; 
    border-radius:12px; padding:24px; text-align:center; cursor:pointer; 
    transition:all .3s; text-decoration:none; color:inherit; display:block; }
  .game-card:hover { border-color:#c9a84c; transform:translateY(-2px); }
  .game-card .icon { font-size:48px; margin-bottom:12px; }
  .game-card h3 { font-size:18px; color:#c9a84c; margin-bottom:8px; }
  .game-card p { font-size:13px; color:#8a7555; line-height:1.6; }
  .game-card .btn { display:inline-block; margin-top:16px; padding:10px 32px; 
    background:linear-gradient(135deg,#c9a84c,#e8c84c); color:#1a0a0a; 
    border-radius:24px; font-size:14px; font-weight:bold; }
  
  /* 问卷嵌入 */
  .form-embed { background:#2a1a10; border:1px solid #4a3a2a; border-radius:12px; 
    padding:16px; margin-top:16px; }
  .form-embed iframe { width:100%; height:1200px; border:none; border-radius:8px; }
  
  .tips { background:#2a1a10; border-left:3px solid #c9a84c; border-radius:0 8px 8px 0;
    padding:16px; margin:24px 0; font-size:13px; color:#d4c4a8; line-height:1.8; }
  .tips strong { color:#c9a84c; }
  
  @media (max-width:500px) {
    .header h1 { font-size:24px; }
    .game-cards { flex-direction:column; }
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="header">
    <h1>🎭 梨园消消</h1>
    <div class="sub">内测反馈 · 先玩游戏，再填问卷</div>
  </div>
  
  <div class="section-title">🎮 第一步：试玩游戏</div>
  
  <div class="tips">
    <strong>💡 内测说明</strong><br>
    · 游戏目前有<strong>普通模式</strong>和<strong>难度模式</strong>（第5关起有冻结格）<br>
    · 建议两种模式都试玩几关，体验更完整<br>
    · 游戏在手机浏览器中体验最佳
  </div>
  
  <div class="game-cards">
    <a class="game-card" href="https://yongzhoulaoxie59.github.io/liyuan-xiaoxiao/normal.html" target="_blank">
      <div class="icon">😊</div>
      <h3>普通模式</h3>
      <p>无冻结格<br>适合新手体验</p>
      <div class="btn">开始游戏</div>
    </a>
    <a class="game-card" href="https://yongzhoulaoxie59.github.io/liyuan-xiaoxiao/hard.html" target="_blank">
      <div class="icon">🔥</div>
      <h3>难度模式</h3>
      <p>第5关起有冻结格<br>适合挑战自我</p>
      <div class="btn">开始游戏</div>
    </a>
  </div>
  
  <div class="section-title">📝 第二步：填写反馈</div>
  
  <div class="tips">
    <strong>🙏 感谢你的反馈！</strong><br>
    · 问卷预计<strong>3分钟</strong>填完<br>
    · 可以跳过不了解的问题<br>
    · 你的意见对游戏改进非常重要
  </div>
  
  <div class="form-embed">
    <iframe src="https://docs.qq.com/form/page/DY05WRW9PSWJ5UUhB"></iframe>
  </div>
  
  <div style="text-align:center; margin-top:32px; font-size:13px; color:#5a4a3a;">
    梨园消消 · 内测版 · 2025
  </div>
  
</div>

</body>
</html>
